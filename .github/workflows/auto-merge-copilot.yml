name: Auto-Merge Copilot PRs
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto-merge ready PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --repo ${{ github.repository }} --state open --json number,isDraft,mergeable 2>/dev/null || echo '[]')
          echo "$OPEN_PRS" | jq -r '.[] | select(.isDraft == false) | .number' | while read PR_NUM; do
            MERGEABLE=$(echo "$OPEN_PRS" | jq -r --argjson n $PR_NUM '.[] | select(.number == $n) | .mergeable')
            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              gh pr merge $PR_NUM --repo ${{ github.repository }} --squash --auto --delete-branch 2>/dev/null || true
            fi
          done
