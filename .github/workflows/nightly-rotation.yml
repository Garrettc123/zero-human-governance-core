name: Nightly Key Rotation

on:
  schedule:
    - cron: '0 10 * * *'  # Run at 10 AM UTC daily (health check)
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          AUTOMATON_URL: ${{ secrets.AUTOMATON_URL }}
          AUTOMATON_ADMIN_KEY: ${{ secrets.AUTOMATON_ADMIN_KEY }}
        run: |
          if [ -z "$AUTOMATON_URL" ]; then echo "⚠️ AUTOMATON_URL not configured — skipping"; exit 0; fi
          if [ -z "$AUTOMATON_ADMIN_KEY" ]; then echo "⚠️ AUTOMATON_ADMIN_KEY not configured — skipping"; exit 0; fi

      - name: Trigger Rotation
        env:
          AUTOMATON_URL: ${{ secrets.AUTOMATON_URL }}
          AUTOMATON_ADMIN_KEY: ${{ secrets.AUTOMATON_ADMIN_KEY }}
        run: |
          curl -X POST "$AUTOMATON_URL/api/rotation/run" \
            -H "X-Admin-API-Key: $AUTOMATON_ADMIN_KEY" \
            -H "Content-Type: application/json"
