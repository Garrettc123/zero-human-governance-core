name: CI / Deploy Governance System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  # ── CI: lint + test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Verify governance imports
        run: |
          python -c "from governance.main import app; from governance.crypto import generate_keypair; print('✅ Imports OK')"

  # ── Deploy to Railway (main branch only) ────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach || echo "⚠️ Railway deploy skipped (token not configured)"

      - name: Deployment summary
        run: |
          echo "✅ Governance Core deployed!"
          echo "📊 Dashboard: https://\${{ secrets.RAILWAY_URL }}/dashboard"
          echo "⏰ Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
