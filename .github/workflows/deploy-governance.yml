name: CI / Deploy Governance System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── CI: lint + test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Verify governance imports
        run: |
          python -c "from governance.main import app; from governance.crypto import generate_keypair; print('✅ Imports OK')"

  # ── Deploy to Railway (main branch only) ────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then echo "⚠️ RAILWAY_TOKEN not configured — skipping deploy"; exit 0; fi

      - name: Install Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then exit 0; fi
          npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then exit 0; fi
          railway up --detach || echo "⚠️ Railway deploy failed"

      - name: Deployment summary
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          echo "✅ Governance Core deployed!"
          echo "📊 Dashboard: https://${RAILWAY_URL:-localhost}/dashboard"
          echo "⏰ Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
